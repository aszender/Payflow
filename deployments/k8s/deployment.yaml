apiVersion: apps/v1
kind: Deployment
metadata:
  name: payflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payflow
  template:
    metadata:
      labels:
        app: payflow
    spec:
      initContainers:
        - name: wait-for-postgres
          image: postgres:16-alpine
          command:
            - /bin/sh
            - -ec
            - |
              until pg_isready -h postgres -p 5432 -U "$POSTGRES_USER" -d "$POSTGRES_DB"; do
                echo "waiting for postgres"
                sleep 2
              done
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: payflow-secrets
                  key: POSTGRES_USER
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: payflow-secrets
                  key: POSTGRES_DB
        - name: wait-for-redis
          image: busybox:1.36
          command:
            - /bin/sh
            - -ec
            - |
              until nc -z redis 6379; do
                echo "waiting for redis"
                sleep 2
              done
        - name: wait-for-kafka
          image: busybox:1.36
          command:
            - /bin/sh
            - -ec
            - |
              until nc -z kafka 9092; do
                echo "waiting for kafka"
                sleep 2
              done
      containers:
        - name: payflow
          image: payflow:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: payflow-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: payflow-secrets
                  key: DATABASE_URL
          ports:
            - containerPort: 8080
              name: http
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /ready
              port: http
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 24
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
