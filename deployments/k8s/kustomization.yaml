apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: payflow
resources:
  - namespace.yaml
  - app-configmap.yaml
  - app-secret.yaml
  - postgres-pvc.yaml
  - postgres-deployment.yaml
  - postgres-service.yaml
  - redis-deployment.yaml
  - redis-service.yaml
  - kafka-pvc.yaml
  - kafka-deployment.yaml
