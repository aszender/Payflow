name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: payflow
          POSTGRES_PASSWORD: payflow_secret
          POSTGRES_DB: payflow
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U payflow -d payflow"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      TEST_DATABASE_URL: postgres://payflow:payflow_secret@localhost:5432/payflow?sslmode=disable
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.1"

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.64.5

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.1.4

      - name: Run govulncheck
        run: govulncheck ./...

      - name: Run unit and integration tests
        run: go test ./...

      - name: Run race tests
        run: go test -race ./...

      - name: Build Docker image
        run: docker build -t payflow:ci .
